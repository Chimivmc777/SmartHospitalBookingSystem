<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Edit Doctor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

<h2>Edit Doctor</h2>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ doctor[2] }}"
required>

</div>

<div class="mb-3">

<label>Department ID</label>

<input
type="number"
name="department_id"
class="form-control"
value="{{ doctor[1] }}"
required>

</div>

<div class="mb-3">

<label>Specialization</label>

<input
type="text"
name="specialization"
class="form-control"
value="{{ doctor[3] }}"
required>

</div>

<div class="mb-3">

<label>Experience</label>

<input
type="number"
name="experience"
class="form-control"
value="{{ doctor[4] }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ doctor[5] }}"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ doctor[6] }}"
required>

</div>

<button class="btn btn-success w-100">

Update Doctor

</button>

</form>

</div>

</div>

</div>

</body>

</html>
