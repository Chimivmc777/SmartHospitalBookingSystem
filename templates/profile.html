<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>👤 My Profile</h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>Patient ID</th>
                    <td>{{ patient[0] }}</td>
                </tr>

                <tr>
                    <th>Name</th>
                    <td>{{ patient[1] }}</td>
                </tr>

                <tr>
                    <th>Gender</th>
                    <td>{{ patient[2] }}</td>
                </tr>

                <tr>
                    <th>Age</th>
                    <td>{{ patient[3] }}</td>
                </tr>

                <tr>
                    <th>Phone</th>
                    <td>{{ patient[4] }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ patient[5] }}</td>
                </tr>

                <tr>
                    <th>Address</th>
                    <td>{{ patient[6] }}</td>
                </tr>

            </table>

            <a href="/dashboard"
               class="btn btn-secondary">

                ← Back to Dashboard

            </a>

        </div>

    </div>

</div>

</body>
</html>
