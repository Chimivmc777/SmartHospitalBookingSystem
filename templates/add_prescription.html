<!DOCTYPE html>
<html>

<head>

    <title>Add Prescription</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Add Prescription</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>Diagnosis</label>

                    <textarea
                        name="diagnosis"
                        class="form-control"
                        required></textarea>

                </div>

                <div class="mb-3">

                    <label>Medicines</label>

                    <textarea
                        name="medicines"
                        class="form-control"
                        required></textarea>

                </div>

                <div class="mb-3">

                    <label>Dosage</label>

                    <textarea
                        name="dosage"
                        class="form-control"
                        required></textarea>

                </div>

                <div class="mb-3">

                    <label>Notes</label>

                    <textarea
                        name="notes"
                        class="form-control"></textarea>

                </div>

                <button class="btn btn-success w-100">

                    Save Prescription

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
