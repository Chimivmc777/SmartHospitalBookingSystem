<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doctors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>👨‍⚕️ Manage Doctors</h2>

        <a href="/admin/add-doctor" class="btn btn-success">
            ➕ Add Doctor
        </a>
    </div>
    <form method="GET" class="mb-4">

    <div class="input-group">

        <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search doctor by name, email or specialization..."
            value="{{ search }}">

        <button class="btn btn-primary">
            🔍 Search
        </button>

        <a href="/admin/doctors"
           class="btn btn-secondary">
            Reset
        </a>

    </div>

</form>
    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Department</th>
                <th>Name</th>
                <th>Specialization</th>
                <th>Experience</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody>

        {% for doctor in doctors %}

        <tr>

    <td>{{ doctor[0] }}</td>
    <td>{{ doctor[1] }}</td>
    <td>{{ doctor[2] }}</td>
    <td>{{ doctor[3] }}</td>
    <td>{{ doctor[4] }} Years</td>
    <td>{{ doctor[5] }}</td>
    <td>{{ doctor[6] }}</td>

    <td>
        <a href="/admin/edit-doctor/{{ doctor[0] }}"
   class="btn btn-warning btn-sm">
    Edit
</a>

<a href="/admin/delete-doctor/{{ doctor[0] }}"
   class="btn btn-danger btn-sm">
    Delete
</a>
    </td>

</tr>

        {% endfor %}

        </tbody>

    </table>

    <a href="/admin/dashboard" class="btn btn-secondary">
        ← Back
    </a>

</div>

</body>
</html>
