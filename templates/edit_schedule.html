<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Edit Schedule</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

<h2>✏️ Edit Doctor Schedule</h2>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">
Available Date
</label>

<input
type="date"
name="available_date"
class="form-control"
value="{{ schedule[2] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">
Start Time
</label>

<input
type="time"
name="start_time"
class="form-control"
value="{{ schedule[3] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">
End Time
</label>

<input
type="time"
name="end_time"
class="form-control"
value="{{ schedule[4] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">
Status
</label>

<select
name="status"
class="form-select">

<option
value="Available"
{% if schedule[5]=="Available" %}selected{% endif %}>
Available
</option>

<option
value="Unavailable"
{% if schedule[5]=="Unavailable" %}selected{% endif %}>
Unavailable
</option>

</select>

</div>

<button class="btn btn-success">

💾 Update Schedule

</button>

<a href="/admin/schedules"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>

</html>
