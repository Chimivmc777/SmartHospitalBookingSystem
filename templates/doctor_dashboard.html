<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Doctor Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

<div class="container">

<a class="navbar-brand fw-bold fs-4">

<i class="bi bi-heart-pulse-fill"></i>

Smart Hospital - Doctor Panel

</a>

<a href="/doctor/logout"
class="btn btn-outline-light">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>

<button
    onclick="toggleTheme()"
    class="btn btn-secondary">

    🌙 Dark Mode

</button>

</div>

</nav>

<div class="container mt-5">

<!-- Welcome -->

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body text-center">

<h2 class="fw-bold text-success">

<i class="bi bi-person-badge-fill"></i>

Welcome, Dr. {{ name }}

</h2>

<p class="text-muted">

Manage your appointments and patient prescriptions from one place.

</p>

</div>

</div>

<!-- Statistics -->

<div class="row mt-4 g-4">

<div class="col-md-4">

<div class="card bg-warning text-dark shadow h-100">

<div class="card-body text-center">

<i class="bi bi-calendar-week-fill"
style="font-size:45px;"></i>

<h5 class="mt-3">

Pending Appointments

</h5>

<h1>

{{ pending }}

</h1>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-success text-white shadow h-100">

<div class="card-body text-center">

<i class="bi bi-check-circle-fill"
style="font-size:45px;"></i>

<h5 class="mt-3">

Confirmed

</h5>

<h1>

{{ confirmed }}

</h1>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-primary text-white shadow h-100">

<div class="card-body text-center">

<i class="bi bi-capsule-pill"
style="font-size:45px;"></i>

<h5 class="mt-3">

Prescriptions

</h5>

<h1>

{{ prescriptions }}

</h1>

</div>

</div>

</div>

</div>

<!-- Doctor Controls -->

<div class="card shadow-lg border-0 rounded-4 mt-5">

<div class="card-header bg-success text-white">

<h4>

Doctor Controls

</h4>

</div>

<div class="card-body">

<div class="row g-4">

<div class="col-md-6">

<div class="card shadow text-center p-4 h-100">

<i class="bi bi-clipboard2-pulse-fill text-success"
style="font-size:60px;"></i>

<h4 class="mt-3">

My Appointments

</h4>

<a href="/doctor/appointments"
class="btn btn-success mt-3">

Open

</a>

</div>

</div>

<div class="col-md-6">

<div class="card shadow text-center p-4 h-100">

<i class="bi bi-box-arrow-right text-danger"
style="font-size:60px;"></i>

<h4 class="mt-3">

Logout

</h4>

<a href="/doctor/logout"
class="btn btn-danger mt-3">

Logout

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</html>
